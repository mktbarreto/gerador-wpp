<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Link WhatsApp — Barreto Imóveis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bim: #AF2846;
      --bim-dark: #8C1F38;
      --bim-light: #F9EEF1;
      --bim-border: #D9607A;
      --text: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --surface: #fff;
      --surface-bg: #F6F5F3;
      --border: rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.2);
      --radius: 8px;
    }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--surface-bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem 3rem;
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2rem 2rem 1.75rem;
      width: 100%;
      max-width: 480px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }

    .header-text strong { display: block; font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
    .header-text span { font-size: 12px; color: var(--text-muted); }
    .field-group { margin-bottom: 1.25rem; }
    label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 7px;
    }
    label .tag-opt { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 11px; color: var(--text-muted); }
    .input-wrap { position: relative; }
    .input-wrap .ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 17px; height: 17px; color: var(--text-muted); pointer-events: none; }
    .input-wrap .ico svg { width: 17px; height: 17px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    input[type="text"] {
      width: 100%;
      height: 42px;
      padding: 0 12px 0 38px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]:focus { border-color: var(--bim); box-shadow: 0 0 0 3px rgba(175,40,70,0.1); background: #fff; }
    input[type="text"]::placeholder { color: #bbb; }
    .error-msg { font-size: 11px; color: #c0392b; margin-top: 5px; display: none; }
    .error-msg.visible { display: block; }
    .preview-box {
      background: var(--bim-light);
      border: 1px solid var(--bim-border);
      border-radius: 10px;
      padding: 13px 15px;
      margin-bottom: 1.25rem;
      display: none;
    }
    .preview-box.visible { display: block; }
    .preview-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--bim); margin-bottom: 6px; }
    .preview-msg { font-size: 13px; color: #5A1020; line-height: 1.55; }
    .result-card {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 15px;
      margin-bottom: 1.25rem;
      display: none;
    }
    .result-card.visible { display: block; }
    .result-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px; }
    .result-link { font-size: 14px; color: var(--bim); word-break: break-all; line-height: 1.55; }
    .result-hint { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
    .btn-row { display: flex; gap: 8px; }
    .btn-primary {
      flex: 1;
      height: 42px;
      background: var(--bim);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-primary svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-primary:hover { background: var(--bim-dark); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-copy {
      height: 42px;
      padding: 0 18px;
      background: transparent;
      color: var(--bim);
      border: 1px solid var(--bim-border);
      border-radius: var(--radius);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-copy.visible { display: flex; }
    .btn-copy svg { width: 15px; height: 15px; fill: none; stroke: var(--bim); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-copy:hover { background: var(--bim-light); }
    .btn-copy:active { transform: scale(0.98); }
    .footer { margin-top: 1.75rem; text-align: center; font-size: 11px; color: var(--text-muted); }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a1a1a;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    @media (max-width: 500px) {
      .card { padding: 1.5rem 1.25rem 1.5rem; }
      .btn-row { flex-direction: column; }
      .btn-copy { justify-content: center; }
    }
  </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//9k=" alt="Barreto Imóveis" style="height:48px; width:auto;" />
    <span style="font-size:12px; color:var(--text-muted); margin-left:auto;">Gerador de link para Stories</span>
  </div>

  <div class="field-group">
    <label for="tel">
      Número WhatsApp do corretor
    </label>
    <div class="input-wrap">
      <span class="ico">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2A19.79 19.79 0 013.1 4.18 2 2 0 015.09 2H8.1a2 2 0 012 1.72c.127.96.36 1.903.7 2.81a2 2 0 01-.45 2.11L9.1 9.91a16 16 0 006.99 6.99l1.27-1.27a2 2 0 012.11-.45c.906.34 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      </span>
      <input type="text" id="tel" placeholder="5511999999999" maxlength="20" autocomplete="off" inputmode="numeric" />
    </div>
    <div class="error-msg" id="tel-error" role="alert"></div>
  </div>

  <div class="field-group">
    <label for="codigo">
      Código do imóvel <span class="tag-opt">(opcional)</span>
    </label>
    <div class="input-wrap">
      <span class="ico">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </span>
      <input type="text" id="codigo" placeholder="Ex: BI-4821" maxlength="30" autocomplete="off" />
    </div>
  </div>

  <div class="preview-box" id="preview-box" aria-live="polite">
    <div class="preview-label">Mensagem que o cliente receberá</div>
    <div class="preview-msg" id="preview-msg"></div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-label">Link gerado</div>
    <div class="result-link" id="result-link"></div>
    <div class="result-hint">O link completo (com a mensagem) é copiado ao clicar em Copiar.</div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" id="btn-gerar" onclick="gerar()">
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      Gerar link
    </button>
    <button class="btn-copy" id="btn-copy" onclick="copiar()" aria-label="Copiar link">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copiar
    </button>
  </div>

  <div class="footer">Barreto Imóveis · Ferramenta interna</div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  var telInput    = document.getElementById('tel');
  var codigoInput = document.getElementById('codigo');
  var previewBox  = document.getElementById('preview-box');
  var previewMsg  = document.getElementById('preview-msg');
  var resultCard  = document.getElementById('result-card');
  var resultLink  = document.getElementById('result-link');
  var btnCopy     = document.getElementById('btn-copy');
  var telError    = document.getElementById('tel-error');
  var toast       = document.getElementById('toast');
  var linkGerado  = '';

  telInput.addEventListener('input', function () {
    this.value = this.value.replace(/[^0-9]/g, '');
    atualizarPreview();
  });

  codigoInput.addEventListener('input', atualizarPreview);

  function atualizarPreview() {
    var tel = telInput.value.trim();
    if (!tel) { previewBox.classList.remove('visible'); return; }
    previewMsg.textContent = montarMensagem(codigoInput.value.trim());
    previewBox.classList.add('visible');
  }

  function montarMensagem(codigo) {
    if (codigo) {
      return 'Ola, vim atraves da postagem do imovel ' + codigo + ' e gostaria de mais informacoes.';
    }
    return 'Ola, vim atraves de uma postagem e gostaria de mais informacoes sobre o imovel.';
  }

  function validarTel(tel) {
    return tel.length >= 10 && tel.length <= 15;
  }

  function gerar() {
    var tel    = telInput.value.trim();
    var codigo = codigoInput.value.trim();

    telError.classList.remove('visible');
    telError.textContent = '';

    if (!tel) {
      telError.textContent = 'Informe o numero do WhatsApp.';
      telError.classList.add('visible');
      telInput.focus();
      return;
    }
    if (!validarTel(tel)) {
      telError.textContent = 'Numero invalido. Use apenas digitos com DDI e DDD. Ex: 5511999999999';
      telError.classList.add('visible');
      telInput.focus();
      return;
    }

    var msg = 'Ol%C3%A1%2C%20vim%20atrav%C3%A9s%20da%20postagem';
    if (codigo) {
      msg = encodeURIComponent('Olá, vim através da postagem do imóvel ' + codigo + ' e gostaria de mais informações.');
    } else {
      msg = encodeURIComponent('Olá, vim através de uma postagem e gostaria de mais informações sobre o imóvel.');
    }

    linkGerado = 'https://wa.me/' + tel + '?text=' + msg;
    resultLink.textContent = 'wa.me/' + tel;
    resultCard.classList.add('visible');
    btnCopy.classList.add('visible');
    mostrarToast('Link gerado!');
  }

  function copiar() {
    if (!linkGerado) return;
    var svgCopy  = '<svg viewBox="0 0 24 24" fill="none" stroke="var(--bim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    var svgCheck = '<svg viewBox="0 0 24 24" fill="none" stroke="var(--bim)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><polyline points="20 6 9 17 4 12"/></svg>';

    navigator.clipboard.writeText(linkGerado).then(function () {
      mostrarToast('Link copiado!');
      btnCopy.innerHTML = svgCheck + ' Copiado';
      setTimeout(function () { btnCopy.innerHTML = svgCopy + ' Copiar'; }, 2200);
    }).catch(function () {
      var el = document.getElementById('result-link');
      var range = document.createRange();
      range.selectNodeContents(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      mostrarToast('Selecione e copie manualmente.');
    });
  }

  var toastTimer;
  function mostrarToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 2300);
  }
</script>
</body>
</html>
